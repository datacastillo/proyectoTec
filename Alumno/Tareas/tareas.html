<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tareas</title>

<link rel="stylesheet" href="../Materias/styles.css">
<link rel="stylesheet" href="tareas.css">

</head>

<body>

<header class="topbar">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<img src="../img/logoTec.png" class="logo">

<!-- DERECHA -->
<div class="top-actions">

<a href="../../frontend/index.html" class="home">🏠</a>

<!-- CAMPANA -->
<div class="notificacion-container" onclick="toggleNotificaciones()">
    🔔
    <span id="notif-dot" class="notif-dot"></span>
</div>

</div>

</header>


<div class="container">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="user">
<img src="../img/user.png" class="user-img">
<span class="user-id">00000000</span>
</div>

<ul class="menu">

<li class="activo">TAREAS ▼</li>

<li>
<a href="../Materias/index.html">MATERIAS ◀</a>
</li>

<li>
<a href="../Calificaciones/calificaciones.html">CALIFICACIONES ◀</a>
</li>

<li>
<a href="../Kardex/kardex.html">KARDEX ◀</a>
</li>

</ul>

</aside>


<!-- CONTENIDO -->
<main class="contenido">

<div class="cards-container">

<!-- CARD 1 -->
<div class="flip-card">
<div class="flip-card-inner">

<div class="flip-card-front">
<h3>Tarea 1</h3>
<p>Codigo html</p>
</div>

<div class="flip-card-back">
<p>Fecha: 10/06</p>
<button class="btn-subir" onclick="abrirModal()">Subir PDF</button>
</div>

</div>
</div>

<!-- CARD 2 -->
<div class="flip-card">
<div class="flip-card-inner">

<div class="flip-card-front">
<h3>Tarea 2</h3>
<p>Resolver ejercicios</p>
</div>

<div class="flip-card-back">
<p>Fecha: 12/06</p>
<button class="btn-subir" onclick="abrirModal()">Subir PDF</button>
</div>

</div>
</div>

<!-- CARD 3 -->
<div class="flip-card">
<div class="flip-card-inner">

<div class="flip-card-front">
<h3>Tarea 3</h3>
<p>Robot</p>
</div>

<div class="flip-card-back">
<p>Fecha: 15/06</p>
<button class="btn-subir" onclick="abrirModal()">Subir PDF</button>
</div>

</div>
</div>

</div>

</main>

</div>


<!-- MODAL -->
<div id="modalPDF" class="modal">

<div class="modal-content">

<h2>Subir Tarea</h2>

<input type="file" accept="application/pdf">

<div class="modal-botones">
<button class="btn-enviar">Subir</button>
<button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
</div>

</div>

</div>


<script>

/* MODAL */
function abrirModal(){
    document.getElementById("modalPDF").style.display="flex";
}

function cerrarModal(){
    document.getElementById("modalPDF").style.display="none";
}

/* MENU */
function toggleMenu(){
    document.querySelector(".sidebar").classList.toggle("active");
}

/* NOTIFICACIONES */
function activarNotificacion() {
    document.getElementById("notif-dot").style.display = "block";
}

function limpiarNotificacion() {
    document.getElementById("notif-dot").style.display = "none";
}

function toggleNotificaciones() {
    alert("Aquí van las notificaciones 🔔");
    limpiarNotificacion();
}

/* SIMULACIÓN */
activarNotificacion();

</script>

</body>
</html>
