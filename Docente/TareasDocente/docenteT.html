<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tareas Docente</title>
<link rel="stylesheet" href="docenteT.css">
</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo-box">
            <img src="../../Alumno/img/logoTec.png" class="logo-tec">
        </div>

        <div class="user-box">
            <img src="../img/user-icon.png">
            <span>00000000</span>
        </div>

        <div class="menu">

            <li>
            <a href="../MateriasDocente/docenteM.html">MATERIAS <span>◀</span></a>    
            </li>

            <li>
            <a href="../TareasDocente/docenteT.html">TAREAS <span>▼</span></a>
            </li>
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="topbar">
            <div class="top-actions">
                <button class="add-btn" onclick="abrirModal()">+</button>
                <a href="../../frontend/index.html" class="home-btn">🏠</a>
                <div class="menu-toggle" onclick="toggleMenu()">☰</div>
            </div>
        </div>

        <!-- CARDS -->
        <div class="cards" id="cards"></div>

        <!-- TABLA -->
        <div id="vistaTarea" class="hidden">
            <button onclick="volver()">⬅ Volver</button>

            <table class="tabla-tarea">
                <thead>
                    <tr>
                        <th>ALUMNO</th>
                        <th>TAREA</th>
                        <th>LINK</th>
                        <th>CALIFICACION</th>
                    </tr>
                </thead>
                <tbody id="tablaTarea"></tbody>
            </table>
        </div>

    </main>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">

        <h3>Titulo tarea</h3>
        <input type="text" id="titulo">

        <h3>Descripcion</h3>
        <input type="text" id="descripcion">

        <h3>Fecha</h3>
        <input type="date" id="fecha">

        <h3>Materia</h3>
        <select id="materia">
            <option value="">Seleccionar</option>
            <option>CALCULO</option>
            <option>ESPAÑOL</option>
            <option>HISTORIA</option>
        </select>

        <h3>Grupo</h3>
        <select id="grupo">
            <option value="">Seleccionar</option>
            <option>6A</option>
            <option>6B</option>
        </select>

        <button onclick="guardarTarea()">GUARDAR</button>

    </div>
</div>

<script src="docenteT.js"></script>

</body>
</html>
