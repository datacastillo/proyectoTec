<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tec San Pedro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Orbitron:wght@400;900&family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="universe"></div>
    <canvas id="particle-canvas"></canvas>

    <main class="viewport">
        <section class="branding">
            <h1>TEC SAN<span>PEDRO</span></h1>
            <div class="btn-container">
                <button class="btn-access" onclick="location.reload()">Acceder</button>
            </div>
        </section>

        <section class="core">
            <div class="emblem-structure" id="emblem-tilt">
                <div class="glass-orb">
                    <div class="shield-img"></div>
                </div>
            </div>
        </section>

        <section class="monitor">
            <div class="monitor-track">
                <div class="monitor-content">
                    <div>Inscripciones</div>
                    <div>Kardex Digital</div>
                    <div>Horarios</div>
                    <div>Docentes</div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
