<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Tec San Pedro</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="universo">
        <div class="caja-login">
            <img src="assets/logo-tec.png" alt="Logo" class="logo">
            
            <form>
                <input type="email" placeholder="Correo electrónico" class="campo" required>
                <input type="password" placeholder="Contraseña" class="campo" required>

                <button type="submit" class="boton-entrar">
                    <span>ENTRAR</span>
                    <span class="flecha">&#10132;</span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
